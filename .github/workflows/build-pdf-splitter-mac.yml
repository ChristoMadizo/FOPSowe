name: Build PDF Splitter (macOS)

on:
  workflow_dispatch:  # uruchamiaj ręcznie z zakładki Actions

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pypdf PyQt6

      - name: Build macOS app
        working-directory: pages/ETYKIETY_jakosc/DZIELENIE_PDF
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "PDF_Splitter" \
            pdf_splitter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF_Splitter_macOS
          path: pages/ETYKIETY_jakosc/DZIELENIE_PDF/dist/PDF_Splitter
          retention-days: 14
