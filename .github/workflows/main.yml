name: Build PDF Splitter (macOS)

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pypdf PyQt6

      - name: Show PyQt6 paths (debug)
        run: |
          python3 - << 'EOF'
          import PyQt6, os
          print("PyQt6 path:", os.path.dirname(PyQt6.__file__))
          EOF

      - name: Build macOS app
        working-directory: pages/ETYKIETY_jakosc/DZIELENIE_PDF
        run: |
          PYQT_PATH=$(python3 -c "import PyQt6, os; print(os.path.dirname(PyQt6.__file__))")
          PLUGINS_PATH="$PYQT_PATH/Qt6/plugins"

          echo "PyQt6 path: $PYQT_PATH"
          echo "Qt6 plugins: $PLUGINS_PATH"

          pyinstaller \
            --onedir \
            --windowed \
            --name "PDF_Splitter" \
            --add-data "$PLUGINS_PATH:Qt/plugins" \
            pdf_splitter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF_Splitter_macOS
          path: pages/ETYKIETY_jakosc/DZIELENIE_PDF/dist/PDF_Splitter
          retention-days: 14
