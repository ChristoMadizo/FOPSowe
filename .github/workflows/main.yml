name: Build PDF Splitter (macOS)

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pypdf PyQt6

      - name: Build macOS app
        working-directory: pages/ETYKIETY_jakosc/DZIELENIE_PDF
        run: |
          rm -f *.spec

          PYQT_PATH=$(python3 -c "import PyQt6, os; print(os.path.dirname(PyQt6.__file__))")
          PLUGINS_PATH="$PYQT_PATH/Qt6/plugins"

          pyinstaller \
            --onedir \
            --windowed \
            --noconsole \
            --name "PDF_Splitter" \
            --hidden-import PyQt6.QtWidgets \
            --hidden-import PyQt6.QtGui \
            --hidden-import PyQt6.QtCore \
            --add-data "$PLUGINS_PATH:Qt/plugins" \
            pdf_splitter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF_Splitter_macOS
          path: pages/ETYKIETY_jakosc/DZIELENIE_PDF/dist/PDF_Splitter
          retention-days: 14
