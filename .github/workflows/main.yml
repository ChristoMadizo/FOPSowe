name: Build PDF Splitter (macOS)

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pypdf PyQt5

      - name: Show PyQt5 paths (debug)
        run: |
          python3 - << 'EOF'
          import PyQt5, os
          print("PyQt5 path:", os.path.dirname(PyQt5.__file__))
          EOF

      - name: Build macOS app
        working-directory: pages/ETYKIETY_jakosc/DZIELENIE_PDF
        run: |
          PYQT_PATH=$(python3 -c "import PyQt5, os; print(os.path.dirname(PyQt5.__file__))")
          PLUGINS_PATH="$PYQT_PATH/Qt/plugins"

          echo "PyQt5 path: $PYQT_PATH"
          echo "Qt plugins: $PLUGINS_PATH"

          pyinstaller \
            --onefile \
            --windowed \
            --name "PDF_Splitter" \
            --hidden-import PyQt5.sip \
            --add-data "$PLUGINS_PATH:Qt/plugins" \
            pdf_splitter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF_Splitter_macOS
          path: pages/ETYKIETY_jakosc/DZIELENIE_PDF/dist/PDF_Splitter
          retention-days: 14
